name: Test

on:
    push:
        branches:
            - '**'
    pull_request:
        branches:
            - '**'

jobs:
    unit-test:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: pnpm
            - run: pnpm install --no-frozen-lockfile
            - run: pnpm test
